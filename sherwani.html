<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sherwani Design | Sui Dhaga</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.design-wrapper {
  max-width: 1200px;
  margin: 80px auto;
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 40px;
  padding: 0 40px;
}
.preview {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.12);
  padding: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 520px;
}
.preview img { width: 100%; max-width: 420px; }
.controls {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.12);
  padding: 30px;
}
.controls h3 {
  font-family: 'Playfair Display', serif;
  margin-bottom: 20px;
  font-size: 24px;
}
.control-group { margin-bottom: 20px; }
.control-group label { display: block; font-size: 13px; color: #333; margin-bottom: 6px; }
.control-group input,
.control-group select {
  width: 100%;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 10px;
  font-family: 'Poppins', sans-serif;
  box-sizing: border-box;
}
.controls button {
  width: 100%;
  padding: 14px;
  background: #7b1e1e;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
  font-family: 'Poppins', sans-serif;
}
.controls button:hover { background: #f3c97a; color: #102542; }
@media (max-width: 980px) { .design-wrapper { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="navbar">
  <div class="logo">SUI DHAGA</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="couture.html">Couture</a>
    <a href="stitch.html">Customise</a>
    <a href="designers.html">Designers</a>
    <a href="profile.html">Profile</a>
    <a href="login.html">Logout</a>
  </nav>
</header>

<section class="collection">
  <h2>Sherwani Design</h2>
  <p>Select fabric, embroidery, buttons and silhouette.</p>
</section>

<div class="design-wrapper">
  <div class="preview">
    <img src="images/mannequin.jpg" alt="Mannequin Preview">
  </div>

  <div class="controls">
    <h3>Customize Your Sherwani</h3>

    <form onsubmit="saveDesign(event)">
      <div class="control-group">
        <label>Color Picker</label>
        <input type="color" name="color" value="#7b1e1e">
      </div>

      <div class="control-group">
        <label>Texture Selector</label>
        <select name="texture">
          <option value="Smooth">Smooth</option>
          <option value="Silk">Silk</option>
          <option value="Velvet">Velvet</option>
          <option value="Jacquard">Jacquard</option>
        </select>
      </div>

      <div class="control-group">
        <label>Fabric Selector</label>
        <select name="fabric">
          <option value="Cotton">Cotton</option>
          <option value="Silk">Silk</option>
          <option value="Velvet">Velvet</option>
          <option value="Brocade">Brocade</option>
        </select>
      </div>

      <div class="control-group">
        <label>Pattern Selector</label>
        <select name="pattern">
          <option value="Plain">Plain</option>
          <option value="Floral">Floral</option>
          <option value="Paisley">Paisley</option>
          <option value="Geometric">Geometric</option>
        </select>
      </div>

      <button type="submit">Save Design</button>
    </form>
  </div>
</div>

<footer>
  <p>© 2026 Sui Dhaga. All Rights Reserved.</p>
</footer>

<script>
function saveDesign(e) {
  e.preventDefault();
  alert('Sherwani design saved! (Demo mode — no database)');
  window.location.href = 'profile.html';
}
</script>

</body>
</html>
