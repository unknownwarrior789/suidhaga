<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Order History | Sui Dhaga</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background-color:#f7f4ef;
margin:0;
color:#1c1c1c;
}

.navbar{
background-color:#7b1e1e;
padding:20px 80px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}

.logo{
font-family:'Playfair Display',serif;
font-size:28px;
color:#f3c97a;
font-weight:700;
}

nav a{
color:white;
text-decoration:none;
margin-left:35px;
font-size:14px;
transition:0.3s;
}

nav a:hover{
color:#f3c97a;
}

.orders-wrapper{
max-width:1200px;
margin:80px auto;
padding:0 60px;
}

.orders-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.orders-header h1{
font-family:'Playfair Display',serif;
font-size:42px;
}

.search-box{
padding:12px 18px;
border-radius:30px;
border:1px solid #ddd;
width:240px;
background:white;
}

.filter-btn{
padding:10px 22px;
border:none;
border-radius:25px;
background:#eee;
margin-right:10px;
cursor:pointer;
transition:0.3s;
}

.filter-btn.active,
.filter-btn:hover{
background:#7b1e1e;
color:white;
}

.table-card{
background:white;
border-radius:12px;
box-shadow:0 15px 30px rgba(0,0,0,0.1);
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#7b1e1e;
color:white;
padding:18px;
font-size:13px;
}

td{
padding:18px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#fafafa;
}

.status{
padding:6px 14px;
border-radius:20px;
font-size:12px;
font-weight:500;
}

.pending{ background:#fff3cd; }
.processing{ background:#d1ecf1; }
.completed{ background:#d4edda; }

.action-btn{
padding:10px 16px;
border:none;
background:#7b1e1e;
color:white;
cursor:pointer;
font-size:13px;
border-radius:5px;
margin-right:6px;
}

.action-btn:hover{
background:#f3c97a;
color:#102542;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:12px;
width:400px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

/* TIMELINE */
.timeline{
margin-top:20px;
}

.timeline div{
margin:12px 0;
padding-left:20px;
position:relative;
font-size:14px;
}

.timeline div::before{
content:"";
position:absolute;
left:0;
top:6px;
width:10px;
height:10px;
background:#7b1e1e;
border-radius:50%;
}

</style>

</head>

<body>

<header class="navbar">
<div class="logo">SUI DHAGA</div>

<nav>
<a href="index.html">Home</a>
<a href="designers.html">Designers</a>
<a href="profile.html">Dashboard</a>
<a href="#">Logout</a>
</nav>
</header>

<section class="orders-wrapper">

<div class="orders-header">
<h1>Order History</h1>
<input type="text" id="search" class="search-box" placeholder="Search orders">
</div>

<div style="margin-bottom:25px;">
<button class="filter-btn active" onclick="filterOrders('all',event)">All</button>
<button class="filter-btn" onclick="filterOrders('pending',event)">Pending</button>
<button class="filter-btn" onclick="filterOrders('processing',event)">Processing</button>
<button class="filter-btn" onclick="filterOrders('completed',event)">Completed</button>
</div>

<div class="table-card">

<table id="ordersTable">

<tr>
<th>Order ID</th>
<th>Designer</th>
<th>Outfit</th>
<th>Status</th>
<th>Date</th>
<th>Actions</th>
</tr>

<tr data-status="pending">
<td>#101</td>
<td>Manyavar</td>
<td>Kurta Set</td>
<td><span class="status pending">Pending</span></td>
<td>12 Mar 2026</td>
<td>
<button class="action-btn" onclick="viewOrder('#101','Manyavar','Kurta Set','Pending')">View</button>
<button class="action-btn" onclick="trackOrder()">Track</button>
</td>
</tr>

<tr data-status="processing">
<td>#102</td>
<td>Anita Dongre</td>
<td>Indo Western</td>
<td><span class="status processing">Processing</span></td>
<td>18 Mar 2026</td>
<td>
<button class="action-btn" onclick="viewOrder('#102','Anita Dongre','Indo Western','Processing')">View</button>
<button class="action-btn" onclick="trackOrder()">Track</button>
</td>
</tr>

<tr data-status="completed">
<td>#103</td>
<td>Sabyasachi</td>
<td>Sherwani</td>
<td><span class="status completed">Completed</span></td>
<td>20 Mar 2026</td>
<td>
<button class="action-btn" onclick="viewOrder('#103','Sabyasachi','Sherwani','Completed')">View</button>
<button class="action-btn">Reorder</button>
</td>
</tr>

</table>

</div>

</section>

<!-- MODAL -->

<div id="modal" class="modal">
<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<h2 id="modalTitle"></h2>
<div id="modalBody"></div>

</div>
</div>

<script>

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
let filter = this.value.toLowerCase();
let rows = document.querySelectorAll("#ordersTable tr");

rows.forEach((row,i)=>{
if(i===0) return;
row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
});
});

/* FILTER */
function filterOrders(status,e){
let rows=document.querySelectorAll("#ordersTable tr");

rows.forEach((row,i)=>{
if(i===0) return;
row.style.display=(status==="all"||row.dataset.status===status)?"":"none";
});

document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");
}

/* VIEW ORDER (DYNAMIC NOW) */
function viewOrder(id, designer, outfit, status){
document.getElementById("modal").style.display="flex";

document.getElementById("modalTitle").innerText = "Order " + id;

document.getElementById("modalBody").innerHTML = `
<p><strong>Designer:</strong> ${designer}</p>
<p><strong>Outfit:</strong> ${outfit}</p>
<p><strong>Status:</strong> ${status}</p>
<p><strong>Estimated Delivery:</strong> 25 March 2026</p>
<p><strong>Type:</strong> Custom Tailored</p>
`;
}

/* TRACK ORDER */
function trackOrder(){
document.getElementById("modal").style.display="flex";
document.getElementById("modalTitle").innerText="Order Tracking";

document.getElementById("modalBody").innerHTML = `
<div class="timeline">
<div>Order Placed</div>
<div>Confirmed by Designer</div>
<div>Stitching in Progress</div>
<div>Quality Check</div>
<div>Out for Delivery</div>
</div>`;
}

/* CLOSE */
function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
