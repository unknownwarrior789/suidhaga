<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up | Sui Dhaga</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.signup-section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f7f4ef;
  padding-top: 80px;
}
.signup-box {
  background: #ffffff;
  padding: 60px;
  width: 420px;
  border-radius: 14px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}
.signup-box h1 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  margin-bottom: 30px;
  text-align: center;
}
.signup-box input,
.signup-box select {
  width: 100%;
  padding: 14px;
  margin-bottom: 20px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-family: 'Poppins', sans-serif;
  box-sizing: border-box;
  font-size: 14px;
  transition: border-color 0.3s;
}
.signup-box input:focus,
.signup-box select:focus {
  outline: none;
  border-color: #7b1e1e;
  box-shadow: 0 0 0 3px rgba(123,30,30,0.1);
}
.signup-box button {
  width: 100%;
  padding: 14px;
  background: #7b1e1e;
  color: white;
  border: none;
  font-size: 14px;
  cursor: pointer;
  transition: 0.3s;
  font-family: 'Poppins', sans-serif;
  border-radius: 6px;
  letter-spacing: 0.5px;
}
.signup-box button:hover { background: #f3c97a; color: #102542; }
.signup-box button:disabled { background: #ccc; cursor: not-allowed; color: #fff; }
.login-link {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
}
.login-link a { color: #7b1e1e; font-weight: 500; text-decoration: none; }
.msg {
  padding: 12px 16px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 20px;
  display: none;
}
.msg.error   { background: #fff0f0; border-left: 4px solid #c0392b; color: #c0392b; display: block; }
.msg.success { background: #f0fff4; border-left: 4px solid #27ae60; color: #27ae60; display: block; }
.msg.loading { background: #fff8e1; border-left: 4px solid #f3c97a; color: #7a6000; display: block; }
</style>
</head>
<body>

<header class="navbar">
  <div class="logo">SUI DHAGA</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="couture.html">Couture</a>
    <a href="stitch.html">Customise</a>
    <a href="designers.html">Designers</a>
    <a href="profile.html">Profile</a>
    <a href="login.html">Login</a>
  </nav>
</header>

<section class="signup-section">
  <div class="signup-box">
    <h1>Create Account</h1>
    <div class="msg" id="statusMsg"></div>
    <input type="text"     id="nameInput"     placeholder="Full Name"               autocomplete="name">
    <input type="text"     id="usernameInput" placeholder="Username"                autocomplete="username">
    <input type="email"    id="emailInput"    placeholder="Email Address"           autocomplete="email">
    <input type="password" id="passwordInput" placeholder="Password (min 6 chars)"  autocomplete="new-password">
    <select id="roleSelect">
      <option value="" disabled selected>Select Role</option>
      <option value="customer">Customer</option>
      <option value="designer">Designer</option>
    </select>
    <button id="signupBtn" onclick="handleSignup()">Create Account</button>
    <div class="login-link">
      Already have an account? <a href="login.html">Sign In</a>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 Sui Dhaga. All Rights Reserved.</p>
</footer>

<!-- Firebase Compat CDN (works with file://, no server needed) -->
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<script>
  // ── Firebase init ──────────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyCV260rVvKEKN41bfX-IdLdpVju_LUJxQM",
    authDomain:        "suidhaga-67554.firebaseapp.com",
    projectId:         "suidhaga-67554",
    storageBucket:     "suidhaga-67554.firebasestorage.app",
    messagingSenderId: "646624824611",
    appId:             "1:646624824611:web:a57f52532604b5ed4bd096"
  };

  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.firestore();

  // ── Signup handler ─────────────────────────────────────────
  async function handleSignup() {
    const name     = document.getElementById("nameInput").value.trim();
    const username = document.getElementById("usernameInput").value.trim();
    const email    = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passwordInput").value;
    const role     = document.getElementById("roleSelect").value;
    const btn      = document.getElementById("signupBtn");
    const msg      = document.getElementById("statusMsg");

    msg.className   = "msg";
    msg.textContent = "";

    if (!name || !username || !email || !password || !role) {
      msg.className   = "msg error";
      msg.textContent = "Please fill in all fields.";
      return;
    }
    if (password.length < 6) {
      msg.className   = "msg error";
      msg.textContent = "Password must be at least 6 characters.";
      return;
    }

    btn.disabled    = true;
    btn.textContent = "Creating account…";
    msg.className   = "msg loading";
    msg.textContent = "Saving your details…";

    try {
      // Check if username already taken
      const existingDoc = await db.collection("users").doc(username).get();
      if (existingDoc.exists) {
        msg.className   = "msg error";
        msg.textContent = "Username already taken.";
        btn.disabled    = false;
        btn.textContent = "Create Account";
        return;
      }

      // Check if email already registered
      const emailSnap = await db.collection("users").where("email", "==", email).get();
      if (!emailSnap.empty) {
        msg.className   = "msg error";
        msg.textContent = "Email already registered.";
        btn.disabled    = false;
        btn.textContent = "Create Account";
        return;
      }

      // Save user document
      await db.collection("users").doc(username).set({
        username: username,
        name:     name,
        email:    email,
        password: password,
        role:     role   // "customer" or "designer"
      });

      // Set session
      sessionStorage.setItem("sd_user", username);
      sessionStorage.setItem("sd_role", role);

      msg.className   = "msg success";
      msg.textContent = "Account created! Redirecting…";

      setTimeout(function () {
        if (role === "designer") {
          window.location.href = "designer_dashboard.html";
        } else {
          window.location.href = "profile.html";
        }
      }, 1200);

    } catch (err) {
      console.error("Signup error:", err);
      msg.className   = "msg error";
      msg.textContent = "Something went wrong: " + (err.message || err);
      btn.disabled    = false;
      btn.textContent = "Create Account";
    }
  }
</script>

</body>
</html>
